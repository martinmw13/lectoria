schema: spec-driven

context: |
  Domain: Multimodal reading application (academic thesis project)
  Project: Web-based EPUB reader with AI-driven multimodal enrichment (contextual music + image generation)
  Academic context: Final project for the AI Specialization (CEIA) at FIUBA, Buenos Aires
  Author: Ing. Martín Madrid
  Advisor: MSc. Lic. Agustín Bernardo

  Architecture:
  - Two-stage LLM pipeline (no model training), sequential unidirectional (LLM 1 → LLM 2):
    - LLM 1: full book in one shot (200K+ context), produces character map (with aliases), setting, genre, chapter summaries
    - LLM 2: per-chapter with numbered paragraphs, produces scenes delimited by paragraph ranges
  - Narrative Context Map (NCM): structured JSON artifact per book, central contract between all modules
  - Scene attributes: emotion (9 categories: joy, sorrow, tension, anger, peace, romance, mystery, excitement, wonder), pacing, scene_type, setting, image_prompt, transition_type. Optional: key_phrases, key_objects
  - Music: curated MTG-Jamendo subset (~200-500 tracks), tag-derived vectors, two-phase matching (filter by emotion + rank by cosine similarity)
  - Images: automatic via scene.image_prompt + on-demand via raw user-selected text sent directly to API. Character identification by string matching against NCM character list (names + aliases). Character memory (best-effort). On-demand images cached per scene on disk under images/on_demand/ (see openspec/changes/reader-experience-hardening)
  - Reader: scene-based navigation (not page-based), with page-view fallback toggle
  - BYOK: all AI via external APIs, provider-agnostic (user selects LLM and image generation provider)
  - Frontend: React + TypeScript
  - Backend: FastAPI (Python)
  - Audio: Web Audio API with crossfade

  Key constraints:
  - No model fine-tuning or pretraining - everything via LLM prompting
  - No audio embedding models (CLAP, Music2Emo) - tag-derived vectors only
  - No prompt rewriter module - LLM 2 produces image_prompt directly
  - EPUB only (no PDF in MVP)
  - Evaluation in English
  - Single developer, ~600 hours budget, ~24 weeks
  - IMPLEMENTATION phase - planning/design complete, building the system

rules:
  proposal:
    - Focus on what and why, not implementation details
    - Include a "Non-goals" section
  design:
    - Include data flow diagrams in ASCII or mermaid
    - Define JSON schemas for all inter-module artifacts
    - Address the open design questions explicitly
  tasks:
    - Tasks are implementation tasks, grouped by phase
    - Each task should be completable in one session (~2-6 hours)
    - Group by phase (foundation → pipeline → enrichment → frontend → evaluation)
